{% extends "base.html" %}
{% block content %}
<section class="section" style="background: var(--navy-900); padding-top: calc(var(--nav-h) + 60px); padding-bottom: 60px; text-align: center; color: #fff;">
  <div class="container">
    <div style="font-size: 3rem; color: var(--purple); margin-bottom: 20px;"><i class="fa-solid fa-envelope-open-text"></i></div>
    <span class="eyebrow" style="color: var(--gold); display: block; text-align: center; margin: 0 auto 12px;">GET IN TOUCH</span>
    <h1 class="heading-1">We'd Love to Hear From You</h1>
    <p style="color: rgba(255,255,255,0.7); max-width: 600px; margin: 20px auto 0;">Have a question or want to book a room? Send us a message.</p>
  </div>
</section>
<section class="section container">
  <div style="display: flex; gap: 40px; max-width: 900px; margin: 0 auto;">
    <div style="flex: 1;">
      <h2 class="heading-2" style="margin-bottom: 20px;">Send a Message</h2>
      <form style="display: flex; flex-direction: column; gap: 15px;">
        <input type="text" placeholder="Your Name" style="padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none;" required>
        <input type="email" placeholder="Your Email" style="padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none;" required>
        <textarea placeholder="Your Message" rows="5" style="padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none; resize: vertical;" required></textarea>
        <button type="button" class="btn btn-primary" style="align-self: flex-start;">Send Message</button>
      </form>
    </div>
    <div style="flex: 1; background: var(--bg); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border);">
      <h2 class="heading-2" style="margin-bottom: 20px;">Contact Info</h2>
      <ul class="footer-contact" style="list-style: none; padding: 0; color: var(--text-2);">
        <li style="margin-bottom: 15px;"><i class="fa-solid fa-phone" style="color: var(--purple); margin-right: 10px;"></i> +91 98765 43210</li>
        <li style="margin-bottom: 15px;"><i class="fa-solid fa-envelope" style="color: var(--purple); margin-right: 10px;"></i> info@staynesthostel.com</li>
        <li style="margin-bottom: 15px;"><i class="fa-solid fa-location-dot" style="color: var(--purple); margin-right: 10px;"></i> 123, University Road, City Center</li>
      </ul>
      <div style="width: 100%; height: 150px; background: var(--slate); border-radius: var(--radius-sm); margin-top: 20px; display: flex; align-items: center; justify-content: center; color: #fff;">Map Placeholder</div>
    </div>
  </div>
</section>
{% endblock %}
